<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Internal – Komisi Informasi Provinsi Jambi</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --border: #e0dbd2;
    --accent: #1a3d2b;
    --accent-mid: #2e6647;
    --accent-light: #e6efe9;
    --gold: #c09a3a;
    --gold-light: #faf5e4;
    --text-primary: #1a1a1a;
    --text-secondary: #5a5a5a;
    --text-muted: #9a9a9a;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.14);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* ── LOADING SCREEN ── */
  #loadingScreen {
    position: fixed; inset: 0; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 9999;
    transition: opacity 0.4s;
  }
  #loadingScreen.hide { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.04em; }
  .loading-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN PAGE ── */
  #loginPage {
    display: none; min-height: 100vh;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 60%, #3a7a56 100%);
    align-items: center; justify-content: center; padding: 24px;
  }
  #loginPage.active { display: flex; }
  .login-card {
    background: var(--surface); border-radius: 20px;
    box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; overflow: hidden;
  }
  .login-header {
    background: var(--accent); padding: 32px 32px 28px;
    text-align: center;
  }
  .login-header img { width: 56px; margin-bottom: 12px; }
  .login-header h1 { font-family: 'Lora', serif; font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3; }
  .login-header p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 4px; }
  .login-body { padding: 32px; }
  .login-body h2 { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-body p { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--accent-mid); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error {
    background: var(--danger-light); border: 1px solid #fecaca; color: var(--danger);
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px;
    margin-top: 12px; display: none;
  }
  .login-error.show { display: block; }
  .login-back { text-align: center; margin-top: 16px; }
  .login-back a { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }

  /* ── APP SHELL ── */
  #appShell { display: none; min-height: 100vh; flex-direction: column; }
  #appShell.active { display: flex; }

  /* Top Bar */
  .app-topbar {
    background: var(--accent); padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .app-topbar-left { display: flex; align-items: center; gap: 12px; }
  .app-topbar-logo { font-family: 'Lora', serif; font-size: 15px; font-weight: 700; color: #fff; }
  .app-topbar-logo span { color: var(--gold); font-size: 11px; display: block; font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .app-topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.12); padding: 6px 12px; border-radius: 20px;
  }
  .user-badge-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--accent);
  }
  .user-badge-info { line-height: 1.2; }
  .user-badge-name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-badge-role { font-size: 10px; color: rgba(255,255,255,0.65); }
  .btn-logout {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.25); }

  /* Main Content */
  .app-main { flex: 1; padding: 28px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
  .page-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }

  /* Role badge */
  .role-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    margin-bottom: 20px;
  }
  .role-badge.majelis { background: #dbeafe; color: #1d4ed8; }
  .role-badge.panitera { background: #fef3c7; color: #92400e; }
  .role-badge.petugas { background: #f3e8ff; color: #6d28d9; }
  .role-badge.admin { background: var(--accent-light); color: var(--accent); }

  /* Cards grid */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 28px; }

  /* Perkara card */
  .perkara-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, transform 0.2s;
  }
  .perkara-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .perkara-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .perkara-register { font-family: 'Lora', serif; font-size: 14px; font-weight: 700; color: var(--accent); }
  .perkara-agenda {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    background: var(--accent-light); color: var(--accent);
  }
  .perkara-para { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
  .perkara-date { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .perkara-catatan-preview {
    margin-top: 12px; padding: 10px 12px;
    background: var(--bg); border-radius: var(--radius-sm);
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    border-left: 3px solid var(--border);
  }
  .perkara-catatan-preview.has-catatan { border-left-color: var(--accent); }
  .btn-edit-catatan {
    margin-top: 12px; width: 100%; padding: 9px; background: var(--accent-light);
    color: var(--accent); border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
  }
  .btn-edit-catatan:hover { background: #c8dece; }

  /* Section header */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 700; }
  .section-count {
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
  }

  /* Modal catatan */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-card {
    background: var(--surface); border-radius: 16px; width: 100%; max-width: 540px;
    box-shadow: var(--shadow-lg); transform: translateY(20px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal-card { transform: translateY(0); }
  .modal-head {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .modal-head h3 { font-family: 'Lora', serif; font-size: 16px; font-weight: 700; }
  .modal-head p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); line-height: 1; }
  .modal-body { padding: 20px 24px; }
  .modal-body textarea {
    width: 100%; min-height: 140px; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-family: 'DM Sans', sans-serif; resize: vertical; outline: none;
    transition: border 0.2s; line-height: 1.6;
  }
  .modal-body textarea:focus { border-color: var(--accent); }
  .modal-foot {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-cancel {
    padding: 9px 20px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; color: var(--text-secondary);
  }
  .btn-save {
    padding: 9px 24px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .btn-save:hover { background: var(--accent-mid); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .save-status { font-size: 12px; color: var(--success); margin-right: auto; display: flex; align-items: center; gap: 4px; }

  /* Form tambah jadwal (petugas) */
  .form-card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-group-dash { margin-bottom: 16px; }
  .form-group-dash label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .form-group-dash input, .form-group-dash select, .form-group-dash textarea {
    width: 100%; padding: 10px 13px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border 0.2s; background: var(--surface);
  }
  .form-group-dash input:focus, .form-group-dash select:focus, .form-group-dash textarea:focus { border-color: var(--accent); }
  .btn-submit {
    padding: 12px 32px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .btn-submit:hover { background: var(--accent-mid); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Admin tabs */
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .admin-tab {
    padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-secondary); transition: all 0.2s;
  }
  .admin-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* User management table */
  .table-wrap { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--bg); padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 13px 16px; font-size: 14px; border-top: 1px solid var(--border); }
  tr:hover td { background: var(--bg); }
  .td-role { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .td-role.majelis { background: #dbeafe; color: #1d4ed8; }
  .td-role.panitera { background: #fef3c7; color: #92400e; }
  .td-role.petugas { background: #f3e8ff; color: #6d28d9; }
  .td-role.admin { background: var(--accent-light); color: var(--accent); }
  .btn-del { background: var(--danger-light); color: var(--danger); border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .btn-del:hover { background: #fecaca; }
  .btn-edit-jadwal { background: var(--accent-light); color: var(--accent); border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; margin-right: 6px; }
  .btn-edit-jadwal:hover { background: #c8dece; }
  #editJadwalModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; padding:16px; }
  #editJadwalModal.open { display:flex; }
  #detailPerkaraModal { display:none; }
  #detailPerkaraModal.open { display:flex; }
  .edit-jadwal-card { background:var(--surface); border-radius:var(--radius); width:100%; max-width:620px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
  .edit-jadwal-head { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .edit-jadwal-head h3 { font-family:'Lora',serif; font-size:16px; font-weight:700; }
  .edit-jadwal-body { padding:20px 24px; }
  .edit-jadwal-foot { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .petugas-tabs { display:flex; gap:8px; margin-bottom:24px; }
  .petugas-tab { padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--surface); color:var(--text-secondary); transition:all 0.2s; }
  .petugas-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: none; }
  .alert.show { display: block; }
  .alert.success { background: var(--success-light); color: var(--success); border: 1px solid #bbf7d0; }
  .alert.error { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Responsive */
  @media (max-width: 600px) {
    .app-main { padding: 20px 16px; }
    .form-row { grid-template-columns: 1fr; }
    .user-badge-info { display: none; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-logo">Komisi Informasi</div>
  <div class="loading-sub">Provinsi Jambi</div>
</div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-header">
      <h1>KOMISI INFORMASI<br>PROVINSI JAMBI</h1>
      <p>Portal Internal Persidangan</p>
    </div>
    <div class="login-body">
      <h2>Masuk</h2>
      <p>Khusus untuk Majelis, Panitera, Petugas, dan Admin</p>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginEmail" placeholder="contoh: zamharir" autocomplete="username" autocorrect="off" autocapitalize="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position:relative">
          <input type="password" id="loginPassword" placeholder="••••••••" style="width:100%;padding-right:44px">
          <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;padding:0" id="eyeBtn">👁️</button>
        </div>
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Masuk</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-back"><a href="index.html">← Kembali ke Jadwal Sidang</a></div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <div class="app-topbar">
    <div class="app-topbar-left">
      <div class="app-topbar-logo">
        KI Jambi
        <span>Portal Internal</span>
      </div>
    </div>
    <div class="app-topbar-right">
      <div class="user-badge">
        <div class="user-badge-avatar" id="topAvatar">–</div>
        <div class="user-badge-info">
          <div class="user-badge-name" id="topName">–</div>
          <div class="user-badge-role" id="topRole">–</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="app-main" id="appMain">
    <!-- Diisi JS sesuai role -->
  </div>
</div>

<!-- MODAL CATATAN -->
<div class="modal-overlay" id="catatanModal">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h3 id="modalTitle">Edit Catatan</h3>
        <p id="modalSub">–</p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <textarea id="modalTextarea" placeholder="Tulis catatan sidang di sini..."></textarea>
    </div>
    <div class="modal-foot">
      <span class="save-status" id="saveStatus" style="display:none">✓ Tersimpan</span>
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="btnSave" onclick="saveCatatan()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL PERKARA -->
<div id="detailPerkaraModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:var(--radius);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)">
    <div style="padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1">
      <div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px">Detail Perkara</div>
        <h3 style="font-family:'Lora',serif;font-size:16px;font-weight:700" id="detailPerkaraTitle">–</h3>
      </div>
      <button class="modal-close" onclick="closeDetailPerkara()">✕</button>
    </div>
    <div style="padding:20px 24px" id="detailPerkaraBody"></div>
  </div>
</div>

<!-- MODAL EDIT JADWAL -->
<div id="editJadwalModal">
  <div class="edit-jadwal-card">
    <div class="edit-jadwal-head">
      <h3>✏️ Edit Jadwal Sidang</h3>
      <button class="modal-close" onclick="closeEditJadwal()">✕</button>
    </div>
    <div class="edit-jadwal-body" id="editJadwalBody"></div>
    <div class="edit-jadwal-foot">
      <button class="btn-cancel" onclick="closeEditJadwal()">Batal</button>
      <button class="btn-save" id="btnSaveEditJadwal" onclick="saveEditJadwal()">Simpan</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, deleteDoc, updateDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase Config ──
const firebaseConfig = {
  apiKey: "AIzaSyBvlaW1M23w3dEGUJgJBBuMEP7YQ_hqDtY",

const app  = initializeApp(firebaseConfig);

const db   = getFirestore(app);

// ── State ──
let currentUser = null;
let currentUserData = null;
let editingDocId = null;

// ── Auth State ──
onAuthStateChanged(auth, async (user) => {
  const loading = document.getElementById('loadingScreen');
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      currentUser = user;
      currentUserData = snap.data();
      showApp();
    } else {
      await signOut(auth);
      showLogin();
    }
  } else {
    showLogin();
  }
  loading.classList.add('hide');
  setTimeout(() => loading.style.display = 'none', 500);
});

function showLogin() {
  document.getElementById('loginPage').classList.add('active');
  document.getElementById('appShell').classList.remove('active');
}

function showApp() {
  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('appShell').classList.add('active');
  setupTopbar();
  renderDashboard();
}

// ── Topbar ──
function setupTopbar() {
  const nama = currentUserData.nama || currentUserData.email;
  const role = currentUserData.role;
  document.getElementById('topName').textContent = nama;
  document.getElementById('topRole').textContent = roleLabel(role);
  document.getElementById('topAvatar').textContent = nama.charAt(0).toUpperCase();
}

function roleLabel(r) {
  return { admin: 'Administrator', majelis: 'Majelis', panitera: 'Panitera', petugas: 'Petugas' }[r] || r;
}
function roleClass(r) {
  return { admin: 'admin', majelis: 'majelis', panitera: 'panitera', petugas: 'petugas' }[r] || '';
}

// ── Login ──
window.doLogin = async function() {
  const username = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass     = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('btnLogin');
  const errEl    = document.getElementById('loginError');
  errEl.classList.remove('show');
  if (!username) { errEl.textContent = 'Masukkan username.'; errEl.classList.add('show'); return; }
  // Auto-tambah domain di belakang
  const email = username.includes('@') ? username : `${username}@kijambi.internal`;
  btn.disabled = true;
  btn.textContent = 'Memuat...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = 'Username atau password salah. Coba lagi.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});

window.togglePassword = function() {
  const input = document.getElementById('loginPassword');
  const btn = document.getElementById('eyeBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
};

// ── Dashboard Router ──
async function renderDashboard() {
  const role = currentUserData.role;
  const main = document.getElementById('appMain');
  if (role === 'majelis')  await renderMajelis(main);
  else if (role === 'panitera') await renderPanitera(main);
  else if (role === 'petugas') renderPetugas(main);
  else if (role === 'admin')   await renderAdmin(main);
}

  `;

async function loadPerkaraMajelis(namaMajelis) {
  const grid = document.getElementById('perkaraGrid');
  const countEl = document.getElementById('perkaraCount');
  try {
    const snap = await getDocs(collection(db, 'jadwal_sidang'));
    const semua = [];
    snap.forEach(d => semua.push({ id: d.id, ...d.data() }));

    const filtered = semua.filter(j => {
      const majelis = (j.majelis || '').toLowerCase();
      return majelis.includes(namaMajelis.toLowerCase());
    });

    const byRegister = {};
    filtered.forEach(j => {
      if (!byRegister[j.register]) byRegister[j.register] = [];
      byRegister[j.register].push(j);
    });

    const registers = Object.keys(byRegister);
    countEl.textContent = registers.length;

    if (registers.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p>Belum ada perkara yang ditugaskan kepada Anda.</p></div>`;
      return;
    }

    const cards = await Promise.all(registers.map(async reg => {
      const sidangList = byRegister[reg].sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));
      const latest = [...sidangList].sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal))[0];

      // Catatan majelis untuk perkara ini
      const catatanSnap = await getDoc(doc(db, 'catatan_majelis', `${reg}_${currentUser.uid}`));
      const catatan = catatanSnap.exists() ? catatanSnap.data().isi : '';

      // History sidang
      const historyHtml = sidangList.map(s => `
        <div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="min-width:90px;font-size:12px;color:var(--text-muted)">${s.tanggal || '-'}<br>${s.jam || ''}</div>
          <div>
            <div style="font-size:13px;font-weight:600">${s.agenda || '-'}</div>
            <div style="font-size:12px;color:var(--text-muted)">${s.catatan || ''}</div>
          </div>
        </div>
      `).join('');

      return `
        <div class="perkara-card" style="margin-bottom:20px">
          <div class="perkara-card-header">
            <div class="perkara-register">${reg}</div>
            <div class="perkara-agenda">${latest.agenda || 'Sidang'}</div>
          </div>
          <div class="perkara-para">${latest.pemohon || '-'} <span style="color:var(--text-muted)">vs</span> ${latest.termohon || '-'}</div>
          <div class="perkara-date">📅 Sidang terakhir: ${latest.tanggal || '-'} &nbsp;🕐 ${latest.jam || '-'}</div>

          <!-- History Sidang -->
          <div style="margin-top:16px">
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">📅 Riwayat Sidang (${sidangList.length}x)</div>
            <div style="background:var(--bg);border-radius:var(--radius-sm);padding:4px 12px;max-height:180px;overflow-y:auto">
              ${historyHtml}
            </div>
          </div>

          <!-- Catatan Majelis -->
          <div style="margin-top:16px">
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">📝 Catatan Sidang Saya</div>
            <div class="perkara-catatan-preview ${catatan ? 'has-catatan' : ''}">
              ${catatan ? catatan.substring(0,150) + (catatan.length > 150 ? '...' : '') : '<em style="color:var(--text-muted)">Belum ada catatan</em>'}
            </div>
            <button class="btn-edit-catatan" style="margin-top:8px" onclick="openCatatanModal('${reg}', '${escapeJs(latest.pemohon||'')} vs ${escapeJs(latest.termohon||'')}', '${escapeJs(catatan)}', 'majelis')">
              ${catatan ? '✏️ Edit Catatan' : '+ Tambah Catatan'}
            </button>
          </div>
        </div>
      `;
    }));
    grid.innerHTML = cards.join('');
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Gagal memuat data: ${e.message}</p></div>`;
  }
}

async function loadPerkaraPanitera(namaPanitera) {
  const grid = document.getElementById('perkaraGrid');
  const countEl = document.getElementById('perkaraCount');
  try {
    const snap = await getDocs(collection(db, 'jadwal_sidang'));
    const semua = [];
    snap.forEach(d => semua.push({ id: d.id, ...d.data() }));

    const filtered = semua.filter(j => {
      const panitera = (j.panitera || '').toLowerCase();
      return panitera.includes(namaPanitera.toLowerCase());
    });

    const byRegister = {};
    filtered.forEach(j => {
      if (!byRegister[j.register]) byRegister[j.register] = [];
      byRegister[j.register].push(j);
    });

    const registers = Object.keys(byRegister);
    countEl.textContent = registers.length;

    if (registers.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p>Belum ada perkara yang ditugaskan.</p></div>`;
      return;
    }

    const cards = await Promise.all(registers.map(async reg => {
      const sidangList = byRegister[reg];
      const latest = sidangList.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal))[0];

      // Catatan panitera
      const catatanSnap = await getDoc(doc(db, 'catatan_panitera', reg));
      const catatan = catatanSnap.exists() ? catatanSnap.data().isi : '';

      // Catatan majelis (panitera bisa LIHAT tapi tidak edit)
      const majelisSnap = await getDocs(collection(db, 'catatan_majelis'));
      const catatanMajelis = [];
      majelisSnap.forEach(d => {
        if (d.id.startsWith(reg + '_')) {
          catatanMajelis.push({ uid: d.id, isi: d.data().isi, nama: d.data().namaMajelis || '–' });
        }
      });

      const majelisHtml = catatanMajelis.length > 0
        ? catatanMajelis.map(cm => `<div style="margin-bottom:6px"><strong style="font-size:11px;color:var(--accent)">${cm.nama}</strong><br><span style="font-size:12px">${cm.isi || '-'}</span></div>`).join('')
        : '<em style="color:var(--text-muted);font-size:12px">Belum ada catatan majelis</em>';

      return `
        <div class="perkara-card">
          <div class="perkara-card-header">
            <div class="perkara-register">${reg}</div>
            <div class="perkara-agenda">${latest.agenda || 'Sidang'}</div>
          </div>
          <div class="perkara-para">${latest.pemohon || '-'} <span style="color:var(--text-muted)">vs</span> ${latest.termohon || '-'}</div>
          <div class="perkara-date">📅 ${latest.tanggal || '-'} &nbsp;🕐 ${latest.jam || '-'}</div>

          <div style="margin-top:12px">
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Catatan Majelis</div>
            <div class="perkara-catatan-preview">${majelisHtml}</div>
          </div>

          <div style="margin-top:12px">
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Catatan Panitera (Saya)</div>
            <div class="perkara-catatan-preview ${catatan ? 'has-catatan' : ''}">
              ${catatan ? catatan.substring(0,100) + (catatan.length > 100 ? '...' : '') : '<em style="color:var(--text-muted)">Belum ada catatan</em>'}
            </div>
          </div>

          <button class="btn-edit-catatan" onclick="openCatatanModal('${reg}', '${latest.pemohon||''} vs ${latest.termohon||''}', '${escapeJs(catatan)}', 'panitera')">
            ${catatan ? '✏️ Edit Catatan Saya' : '+ Tambah Catatan'}
          </button>
        </div>
      `;
    }));
    grid.innerHTML = cards.join('');
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Gagal memuat data.</p></div>`;
  }
}

window.submitJadwal = async function() {
  const btn = document.getElementById('btnSubmitJadwal');
  const required = ['f_register','f_tanggal','f_jam','f_agenda','f_pemohon','f_termohon'];
  const vals = {};
  for (const f of required) {
    vals[f] = document.getElementById(f).value.trim();
    if (!vals[f]) { showAlert('error', 'Harap isi semua kolom yang wajib (*).'); return; }
  }
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    await addDoc(collection(db, 'jadwal_sidang'), {
      register     : vals.f_register,
      tanggal      : vals.f_tanggal,
      jam          : vals.f_jam,
      agenda       : vals.f_agenda,
      pemohon      : vals.f_pemohon,
      termohon     : vals.f_termohon,
      majelis      : document.getElementById('f_majelis').value.trim(),
      mediator     : document.getElementById('f_mediator').value.trim(),
      panitera     : document.getElementById('f_panitera').value.trim(),
      status       : document.getElementById('f_status').value.trim(),
      link_putusan : document.getElementById('f_link_putusan').value.trim(),
      catatan      : document.getElementById('f_catatan').value.trim(),
      createdAt    : new Date().toISOString(),
      createdBy    : currentUser.uid
    });
    showAlert('success', '✓ Jadwal berhasil ditambahkan!');
    ['f_register','f_tanggal','f_jam','f_agenda','f_pemohon','f_termohon','f_majelis','f_mediator','f_panitera','f_status','f_link_putusan','f_catatan']
      .forEach(f => document.getElementById(f).value = '');
  } catch(e) {
    showAlert('error', 'Gagal menyimpan: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '+ Tambah Jadwal';
};

// Edit jadwal (petugas & admin)
let _editJadwalId = null;
window.openEditJadwal = async function(id) {
  _editJadwalId = id;
  const d = await getDoc(doc(db, 'jadwal_sidang', id));
  if (!d.exists()) return;
  const data = d.data();
  document.getElementById('editJadwalModal').classList.add('open');
  document.getElementById('editJadwalBody').innerHTML = formJadwalFields(data);
};

window.closeEditJadwal = function() {
  document.getElementById('editJadwalModal').classList.remove('open');
  _editJadwalId = null;
};

window.saveEditJadwal = async function() {
  if (!_editJadwalId) return;
  const btn = document.getElementById('btnSaveEditJadwal');
  const required = ['f_register','f_tanggal','f_jam','f_agenda','f_pemohon','f_termohon'];
  for (const f of required) {
    if (!document.getElementById(f).value.trim()) {
      alert('Harap isi semua kolom yang wajib (*).'); return;
    }
  }
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    await updateDoc(doc(db, 'jadwal_sidang', _editJadwalId), {
      register     : document.getElementById('f_register').value.trim(),
      tanggal      : document.getElementById('f_tanggal').value.trim(),
      jam          : document.getElementById('f_jam').value.trim(),
      agenda       : document.getElementById('f_agenda').value.trim(),
      pemohon      : document.getElementById('f_pemohon').value.trim(),
      termohon     : document.getElementById('f_termohon').value.trim(),

// ── Admin tab handlers ──
function _switchAdminTab(el, fn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const cont = document.getElementById('adminContent');
  cont.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto 12px"></div><p>Memuat...</p></div>';
  fn().catch(e => { cont.innerHTML = '<div class="empty-state"><p>⚠️ Error: ' + e.message + '</p></div>'; });
}
window.__tabUsers   = function(el) { _switchAdminTab(el, loadAdminUsers);   };
window.__tabJadwal  = function(el) { _switchAdminTab(el, loadAdminJadwal);  };
window.__tabCatatan = function(el) { _switchAdminTab(el, loadAdminCatatan); };
window.adminTab = function(tab, el) {
  if (tab === 'users')   window.__tabUsers(el);
  else if (tab === 'jadwal')   window.__tabJadwal(el);
  else if (tab === 'catatan')  window.__tabCatatan(el);
};

window.createUser = async function() {
  const nama  = document.getElementById('u_nama').value.trim();
  const email = document.getElementById('u_email').value.trim();
  const pass  = document.getElementById('u_pass').value.trim();
  const role  = document.getElementById('u_role').value;
  if (!nama || !email || !pass || !role) { showAdminAlert('error', 'Semua kolom wajib diisi.'); return; }
  if (pass.length < 6) { showAdminAlert('error', 'Password minimal 6 karakter.'); return; }

  // Buat user via Anthropic API proxy (kita pakai Cloud Function workaround)
  // Karena client-side Firebase Auth tidak bisa buat user lain,
  // kita simpan dulu ke collection 'pending_users' lalu admin approve
  try {
    await addDoc(collection(db, 'pending_users'), {
      nama, email, password: pass, role,
      createdAt: new Date().toISOString(),
      createdBy: currentUser.uid,
      status: 'pending'
    });
    showAdminAlert('success', `✓ Permintaan akun untuk ${nama} (${email}) telah disimpan. Gunakan Firebase Console → Authentication → Add User untuk menyelesaikan pembuatan akun, lalu salin UID-nya ke collection "users".`);
    ['u_nama','u_email','u_pass'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('u_role').value = '';
  } catch(e) {
    showAdminAlert('error', 'Gagal: ' + e.message);
  }
};

window.deleteUser = async function(uid, nama) {
  if (!confirm(`Hapus akun ${nama}? Catatan yang dibuat tetap tersimpan.`)) return;
  try {
    await deleteDoc(doc(db, 'users', uid));
    showAdminAlert('success', `✓ Akun ${nama} berhasil dihapus dari sistem.`);
    await loadUserTable();
  } catch(e) {
    showAdminAlert('error', 'Gagal menghapus: ' + e.message);
  }
};

window.openDetailPerkara = async function(register) {
  const modal = document.getElementById('detailPerkaraModal');
  document.getElementById('detailPerkaraBody').innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto 12px"></div><p>Memuat...</p></div>`;
  modal.classList.add('open');

  try {
    const snap = await getDocs(collection(db, 'jadwal_sidang'));
    const semua = [];
    snap.forEach(d => semua.push({ id: d.id, ...d.data() }));
    const sidangList = semua.filter(j => j.register === register)
      .sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));

    if (sidangList.length === 0) {
      document.getElementById('detailPerkaraBody').innerHTML = `<div class="empty-state"><p>Data tidak ditemukan.</p></div>`;
      return;
    }

    const latest = sidangList[sidangList.length - 1];

    // Ambil catatan panitera & majelis
    const [catatanPanSnap, catatanMajelisSnap] = await Promise.all([
      getDoc(doc(db, 'catatan_panitera', register)),
      getDocs(collection(db, 'catatan_majelis'))
    ]);
    const catatanPanitera = catatanPanSnap.exists() ? catatanPanSnap.data().isi : '';
    const catatanMajelisList = [];
    catatanMajelisSnap.forEach(d => {
      if (d.id.startsWith(register + '_')) {
        catatanMajelisList.push({ nama: d.data().namaMajelis || '–', isi: d.data().isi || '' });
      }
    });

    const historyHtml = sidangList.map((s,i) => `
      <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="min-width:100px;font-size:12px;color:var(--text-muted)">${s.tanggal||'-'}<br><strong>${s.jam||''}</strong></div>
        <div>
          <div style="font-size:13px;font-weight:600">${s.agenda||'-'}</div>
          ${s.catatan ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${s.catatan}</div>` : ''}
        </div>
      </div>
    `).join('');

    const majelisHtml = catatanMajelisList.length > 0
      ? catatanMajelisList.map(cm => `
          <div style="margin-bottom:10px;padding:10px;background:var(--bg);border-radius:var(--radius-sm)">
            <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px">${cm.nama}</div>
            <div style="font-size:13px">${cm.isi}</div>
          </div>
        `).join('')
      : '<em style="font-size:13px;color:var(--text-muted)">Belum ada catatan majelis</em>';

    document.getElementById('detailPerkaraTitle').textContent = register;
    document.getElementById('detailPerkaraBody').innerHTML = `
      <div style="margin-bottom:16px">
        <div style="font-size:15px;font-weight:700">${latest.pemohon||'-'} <span style="color:var(--text-muted);font-weight:400">vs</span> ${latest.termohon||'-'}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">
          Majelis: ${latest.majelis||'-'} &nbsp;|&nbsp; Mediator: ${latest.mediator||'-'} &nbsp;|&nbsp; Panitera: ${latest.panitera||'-'}
        </div>
        <div style="margin-top:6px">
          <span class="badge badge-${latest.status?'green':'blue'}" style="font-size:12px;padding:3px 10px;border-radius:99px;background:var(--accent-light);color:var(--accent);font-weight:600">${latest.status||'Aktif'}</span>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">📅 Riwayat Sidang (${sidangList.length}x)</div>
        <div style="background:var(--bg);border-radius:var(--radius-sm);padding:4px 12px;max-height:200px;overflow-y:auto">${historyHtml}</div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">📝 Catatan Panitera <span style="font-weight:400;color:var(--accent)">(bisa dilihat publik)</span></div>
        <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:13px">
          ${catatanPanitera || '<em style="color:var(--text-muted)">Belum ada catatan</em>'}
        </div>
        <button class="btn-edit-catatan" style="margin-top:8px" onclick="adminEditCatatanDariDetail('panitera','${register}','${escapeJs(catatanPanitera)}')">
          ${catatanPanitera ? '✏️ Edit Catatan Panitera' : '+ Tambah Catatan Panitera'}
        </button>
      </div>

      <div>
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">⚖️ Catatan Majelis <span style="font-weight:400;color:var(--danger)">(hanya admin & majelis)</span></div>
        ${majelisHtml}
      </div>
    `;
  } catch(e) {
    document.getElementById('detailPerkaraBody').innerHTML = `<div class="empty-state"><p>Gagal memuat: ${e.message}</p></div>`;
  }
};

      await setDoc(doc(db, 'catatan_majelis', docId), {
        isi, register,
        namaMajelis: currentUserData.nama,
        uid: currentUser.uid,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    }
    showAdminAlert('success', `✓ Catatan ${tipe} untuk ${register} berhasil disimpan!`);
    document.getElementById('cn_register').value = '';
    document.getElementById('cn_isi').value = '';
    await refreshAdminCatatanList();
  } catch(e) {
    showAdminAlert('error', 'Gagal menyimpan: ' + e.message);
  }
};

window.adminEditCatatan = function(tipe, docId, isi, register) {
  editingDocId = { tipe, docId, register };
  document.getElementById('modalTitle').textContent = `Edit Catatan ${tipe === 'majelis' ? 'Majelis' : 'Panitera'}`;
  document.getElementById('modalSub').textContent = register;
  document.getElementById('modalTextarea').value = isi;
  document.getElementById('saveStatus').style.display = 'none';
  document.getElementById('catatanModal').classList.add('open');
};

// ════════════════════════════════════
// MODAL CATATAN
// ════════════════════════════════════
window.openCatatanModal = function(register, para, catatan, tipe) {
  editingDocId = { register, tipe };
  document.getElementById('modalTitle').textContent = tipe === 'majelis' ? 'Catatan Majelis' : 'Catatan Panitera';
  document.getElementById('modalSub').textContent = register + ' — ' + para;
  document.getElementById('modalTextarea').value = catatan;
  document.getElementById('saveStatus').style.display = 'none';
  document.getElementById('catatanModal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('catatanModal').classList.remove('open');
  editingDocId = null;
  // Refresh dashboard
  renderDashboard();
};

window.saveCatatan = async function() {
  const btn = document.getElementById('btnSave');
  const isi = document.getElementById('modalTextarea').value.trim();
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    if (editingDocId.tipe === 'majelis') {
      // Admin edit existing
      if (editingDocId.docId) {
        await setDoc(doc(db, 'catatan_majelis', editingDocId.docId), { isi, updatedAt: new Date().toISOString() }, { merge: true });
      } else {
        // Majelis save own
        const docId = `${editingDocId.register}_${currentUser.uid}`;
        await setDoc(doc(db, 'catatan_majelis', docId), {
          isi, register: editingDocId.register,
          namaMajelis: currentUserData.nama,
          uid: currentUser.uid,
          updatedAt: new Date().toISOString()
        }, { merge: true });
      }
    } else {
      // Panitera / admin edit panitera
      const docId = editingDocId.docId || editingDocId.register;
      await setDoc(doc(db, 'catatan_panitera', docId), {
        isi, register: editingDocId.register || docId,
        namaPanitera: currentUserData.nama,
        uid: currentUser.uid,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    }
    document.getElementById('saveStatus').style.display = 'flex';
    btn.textContent = 'Simpan';
    btn.disabled = false;
    setTimeout(() => document.getElementById('saveStatus').style.display = 'none', 3000);
  } catch(e) {
    btn.textContent = 'Simpan';
    btn.disabled = false;
    alert('Gagal menyimpan: ' + e.message);
  }
};

// ── Helpers ──
function showAlert(type, msg) {
  const el = document.getElementById('dashAlert');
  if (!el) return;
  el.className = `alert ${type} show`;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 5000);
}

function showAdminAlert(type, msg) {
  const el = document.getElementById('adminAlert');
  if (!el) return;
  el.className = `alert ${type} show`;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 8000);
}

function escapeJs(str) {
  return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

};
